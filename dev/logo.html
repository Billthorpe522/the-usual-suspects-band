<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Usual Suspects — Animated Logo</title>
<style>
  :root { --bg: #000; --ink: #fff; --stroke: 3.5; }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Georgia, serif;
    color: var(--ink);
    overflow: hidden;
  }

  .stage {
    width: min(100vw, 100vh, 720px);
    height: min(100vw, 100vh, 720px);
    position: relative;
    background: #000;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
  }

  .logo {
    width: 100%;
    height: 100%;
    display: block;
    position: relative;
    z-index: 2;
  }
  .logo .stroke {
    fill: none;
    stroke: var(--ink);
    stroke-width: var(--stroke);
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .logo .fill-white { fill: var(--ink); stroke: none; }

  /* ─── ANIMATIONS ─────────────────────────────────────────── */

  /* Bandana reveal */
  .bandana {
    transform-origin: 50% 60%;
    animation: bandanaReveal 7s ease-in-out infinite;
  }
  @keyframes bandanaReveal {
    0%, 50% { transform: translateY(0); }
    55%, 65% { transform: translateY(28px) scaleY(0.7); }
    70%, 100% { transform: translateY(0); }
  }

  .eyes {
    opacity: 0;
    animation: eyesFlash 7s ease-in-out infinite;
  }
  @keyframes eyesFlash {
    0%, 50% { opacity: 0; }
    57%, 62% { opacity: 1; }
    70%, 100% { opacity: 0; }
  }

  .hat {
    transform-origin: 50% 100%;
    animation: hatLift 7s ease-in-out infinite;
  }
  @keyframes hatLift {
    0%, 50% { transform: translateY(0); }
    57%, 65% { transform: translateY(-6px); }
    70%, 100% { transform: translateY(0); }
  }

  .moto {
    transform-origin: 50% 90%;
    animation: motoIdle 1.4s ease-in-out infinite;
  }
  @keyframes motoIdle {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    25% { transform: translate(0.4px, -0.5px) rotate(0.05deg); }
    50% { transform: translate(-0.3px, 0.4px) rotate(-0.04deg); }
    75% { transform: translate(0.3px, -0.3px) rotate(0.03deg); }
  }

  .exhaust {
    transform-origin: 50% 50%;
    animation: exhaustPulse 1.4s ease-in-out infinite;
  }
  @keyframes exhaustPulse {
    0%, 100% { opacity: 0.85; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.04); }
  }

  .note-left, .note-right {
    transform-origin: 50% 50%;
    animation: noteFloat 4s ease-in-out infinite;
  }
  .note-right { animation-delay: 2s; }
  @keyframes noteFloat {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    50% { transform: translate(2px, -6px) rotate(2deg); }
  }

  .star {
    transform-origin: center;
    transform-box: fill-box;
    animation: starSpin 9s linear infinite;
  }
  .star.s2 { animation-duration: 11s; animation-direction: reverse; }
  .star.s3 { animation-duration: 13s; }
  @keyframes starSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .bar {
    transform-origin: center;
    animation: barFlex 4.5s ease-in-out infinite;
  }
  .bar.b2 { animation-delay: 0.4s; }
  .bar.b3 { animation-delay: 0.8s; }
  .bar.b4 { animation-delay: 1.2s; }
  @keyframes barFlex {
    0%, 100% { transform: scaleX(1); }
    50% { transform: scaleX(0.985); }
  }

  .banner {
    animation: bannerPulse 4s ease-in-out infinite;
  }
  @keyframes bannerPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.78; }
  }

  .title { animation: titleFade 1.6s ease-out both; }
  @keyframes titleFade {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .caption { animation: captionFade 1.4s ease-out 0.4s both; }
  @keyframes captionFade {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @media (prefers-reduced-motion: reduce) {
    .bandana, .eyes, .hat, .moto, .exhaust,
    .note-left, .note-right, .star, .bar, .banner,
    .title, .caption {
      animation: none !important;
    }
    .eyes { opacity: 0; }
  }
</style>
</head>
<body>
<div class="stage">
  <svg class="logo" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">

    <!-- TOP TITLE -->
    <g class="title">

            font-size="46"
            letter-spacing="2"
            fill="#fff"
            style="font-variant: small-caps;">The Usual Suspects</text>
      <path class="stroke" d="M 130 80 Q 170 92 200 80 Q 230 70 250 80" stroke-width="2"/>
      <path class="stroke" d="M 350 80 Q 380 70 400 80 Q 430 92 470 80" stroke-width="2"/>

      <circle class="fill-white" cx="480" cy="60" r="2.5"/>

    <!-- STAR BURSTS -->
    <g class="star s1" transform="translate(95 235)">

      <path class="stroke" d="M 0 -14 L 4 -5 L 14 -3 L 6 3 L 9 14 L 0 8 L -9 14 L -6 3 L -14 -3 L -4 -5 Z" stroke-width="2.5"/>

    <!-- JAIL CELL -->
    <g>
      <rect class="stroke" x="155" y="175" width="290" height="195" rx="4" stroke-width="3.5"/>
      <line class="stroke" x1="155" y1="175" x2="445" y2="175" stroke-width="3.5"/>
      <line class="bar b1 stroke" x1="200" y1="175" x2="200" y2="370" stroke-width="3"/>
      <line class="bar b2 stroke" x1="245" y1="175" x2="245" y2="370" stroke-width="3"/>

      <line class="bar stroke" x1="400" y1="175" x2="400" y2="370" stroke-width="3"/>

    <!-- BANDIT -->
    <g>
      <g class="hat">
        <ellipse class="stroke" cx="300" cy="242" rx="65" ry="8" stroke-width="3"/>

        <path class="stroke" d="M 268 234 Q 300 228 332 234" stroke-width="2"/>
        <path class="stroke" d="M 263 240 L 337 240" stroke-width="2"/>
      </g>

      <path class="stroke" d="M 270 255 Q 270 290 285 300 Q 300 306 315 300 Q 330 290 330 255" stroke-width="3"/>

      <g class="eyes">
        <ellipse class="stroke" cx="287" cy="262" rx="9" ry="6" stroke-width="2.5"/>
        <ellipse class="stroke" cx="313" cy="262" rx="9" ry="6" stroke-width="2.5"/>
        <line class="stroke" x1="296" y1="262" x2="304" y2="262" stroke-width="2"/>
        <line class="stroke" x1="278" y1="260" x2="270" y2="258" stroke-width="2"/>
        <line class="stroke" x1="322" y1="260" x2="330" y2="258" stroke-width="2"/>
        <ellipse class="fill-white" cx="285" cy="260" rx="1.2" ry="1.5" opacity="0.6"/>
        <ellipse class="fill-white" cx="311" cy="260" rx="1.2" ry="1.5" opacity="0.6"/>
      </g>

      <g class="bandana">
        <path class="stroke" d="M 273 270 Q 300 278 327 270 L 327 300 Q 300 310 273 300 Z" stroke-width="2.8"/>
        <path class="stroke" d="M 280 280 Q 290 285 300 280 Q 310 285 320 280" stroke-width="1.5"/>
        <path class="stroke" d="M 280 290 Q 290 295 300 290 Q 310 295 320 290" stroke-width="1.5"/>
      </g>

      <path class="stroke" d="M 285 306 L 285 322 Q 300 330 315 322 L 315 306" stroke-width="2.5"/>

      <path class="stroke" d="M 240 370 Q 250 330 285 322 L 315 322 Q 350 330 360 370" stroke-width="3"/>
      <path class="stroke" d="M 285 322 L 285 342 M 315 322 L 315 342" stroke-width="2"/>
      <line class="stroke" x1="300" y1="330" x2="300" y2="370" stroke-width="2"/>
    </g>

    <!-- HANDS -->
    <g>
      <path class="stroke" d="M 195 350 Q 188 345 192 335 Q 196 330 202 332 Q 208 336 205 345" stroke-width="3"/>
      <path class="stroke" d="M 405 350 Q 412 345 408 335 Q 404 330 398 332 Q 392 336 395 345" stroke-width="3"/>
    </g>

    <!-- MOTORCYCLE -->
    <g class="moto">
      <line class="stroke" x1="140" y1="455" x2="475" y2="455" stroke-width="4"/>
      <path class="stroke" d="M 255 425 L 255 460 L 325 460 L 325 425 Z" stroke-width="3"/>
      <line class="stroke" x1="265" y1="432" x2="265" y2="455" stroke-width="1.5"/>
      <line class="stroke" x1="278" y1="432" x2="278" y2="455" stroke-width="1.5"/>
      <line class="stroke" x1="302" y1="432" x2="302" y2="455" stroke-width="1.5"/>
      <line class="stroke" x1="315" y1="432" x2="315" y2="455" stroke-width="1.5"/>
      <line class="stroke" x1="258" y1="438" x2="322" y2="438" stroke-width="1"/>
      <line class="stroke" x1="258" y1="448" x2="322" y2="448" stroke-width="1"/>
      <ellipse class="stroke" cx="218" cy="437" rx="34" ry="17" stroke-width="3"/>
      <line class="stroke" x1="212" y1="425" x2="224" y2="425" stroke-width="2"/>
      <path class="stroke" d="M 348 440 Q 370 428 398 434 L 415 444 L 348 444 Z" stroke-width="3"/>
      <line class="stroke" x1="145" y1="455" x2="135" y2="500" stroke-width="3"/>
      <line class="stroke" x1="160" y1="455" x2="135" y2="500" stroke-width="3"/>
      <line class="stroke" x1="465" y1="455" x2="475" y2="500" stroke-width="3"/>
      <line class="stroke" x1="450" y1="455" x2="475" y2="500" stroke-width="3"/>
      <path class="stroke" d="M 135 405 Q 122 400 122 425 Q 122 450 138 450" stroke-width="3"/>
      <circle class="stroke" cx="120" cy="403" r="4" stroke-width="2"/>
      <g class="exhaust">
        <path class="stroke" d="M 330 472 Q 365 478 405 481 Q 435 483 460 483" stroke-width="4"/>
        <circle class="stroke" cx="460" cy="483" r="5" stroke-width="2.5"/>
      </g>
      <circle class="stroke" cx="135" cy="510" r="22" stroke-width="3"/>
      <circle class="stroke" cx="135" cy="510" r="9" stroke-width="2.5"/>
      <line class="stroke" x1="135" y1="488" x2="135" y2="532" stroke-width="1.5"/>
      <line class="stroke" x1="113" y1="510" x2="157" y2="510" stroke-width="1.5"/>
      <circle class="stroke" cx="475" cy="510" r="24" stroke-width="3"/>
      <circle class="stroke" cx="475" cy="510" r="10" stroke-width="2.5"/>
      <line class="stroke" x1="475" y1="486" x2="475" y2="534" stroke-width="1.5"/>
      <line class="stroke" x1="451" y1="510" x2="499" y2="510" stroke-width="1.5"/>
      <line class="stroke" x1="413" y1="440" x2="415" y2="410" stroke-width="2.5"/>
      <path class="stroke" d="M 415 410 Q 430 410 430 422" stroke-width="2.5"/>
    </g>

    <!-- EIGHTH NOTES -->
    <g class="note-left">
      <line class="stroke" x1="135" y1="558" x2="135" y2="528" stroke-width="3"/>
      <ellipse class="fill-white" cx="128" cy="562" rx="7" ry="5" transform="rotate(-20 128 562)"/>
    </g>
    <g class="note-right">
      <line class="stroke" x1="465" y1="558" x2="465" y2="528" stroke-width="3"/>
      <ellipse class="fill-white" cx="458" cy="562" rx="7" ry="5" transform="rotate(-20 458 562)"/>
    </g>

    <!-- TAGLINE -->
    <g class="banner caption">
      <text x="300" y="568" text-anchor="middle"
            font-family="Georgia, 'Times New Roman', serif"
            font-style="italic"
            font-size="22"
            fill="#fff"
            font-weight="400">music for all occasions</text>
    </g>

    <line class="stroke" x1="80" y1="540" x2="520" y2="540" stroke-width="1" opacity="0.4"/>

  </svg>
</div>
</body>
</html>
