<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Usual Suspects — Video Bumper</title>
<style>
  :root { --bg: #000; --ink: #fff; --stroke: 3.5; }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Georgia, serif;
    color: var(--ink);
    overflow: hidden;
  }

  .stage {
    width: min(100vw, 100vh, 720px);
    height: min(100vw, 100vh, 720px);
    position: relative;
    background: #000;
  }

  /* SVG fills the stage */
  .logo {
    width: 100%;
    height: 100%;
    display: block;
  }
  .logo .stroke {
    fill: none;
    stroke: var(--ink);
    stroke-width: var(--stroke);
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .logo .fill-white { fill: var(--ink); stroke: none; }

  /* ─── MASTER TIMELINE ─────────────────────────────────────
   * 0s    : everything invisible (opacity 0)
   * 0–1s  : black with hint of cigarette smoke drift (subtle)
   * 1–3s  : title scratches in, stars pop in sequentially
   * 3–5s  : cell + bandit fade in, hat settles
   * 5–7s  : bandana slides down, sunglasses flash for 1.2s, bandana slides back
   * 7–9s  : motorcycle rolls in from the right
   * 9–11s : exhaust smoke plume drifts, then exhaust pulse starts
   * 11–13s: tagline fades up
   * 13–15s: hold, then fade to black at 15s
   */

  .layer { opacity: 0; }

  /* Layer 1: Title */
  .layer-title { animation: titleIn 1.5s ease-out 1s forwards; }
  @keyframes titleIn {
    0%   { opacity: 0; transform: translateY(-12px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* Layer 2: Stars */
  .star.s1 { animation: starIn 0.5s ease-out 1.8s forwards, starSpin 9s linear 2.3s infinite; }
  .star.s2 { animation: starIn 0.5s ease-out 2.0s forwards, starSpin 11s linear 2.5s reverse infinite; }
  .star.s3 { animation: starIn 0.5s ease-out 2.2s forwards, starSpin 13s linear 2.7s infinite; }
  @keyframes starIn {
    0%   { opacity: 0; transform: scale(0); }
    70%  { opacity: 1; transform: scale(1.2); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes starSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* Layer 3: Cell + bandit */
  .layer-cell  { animation: fadeIn 1.0s ease-out 3.0s forwards; }
  .layer-bandit { animation: fadeIn 1.0s ease-out 3.5s forwards; }
  @keyframes fadeIn { to { opacity: 1; } }

  /* Bandana reveal — only after cell is fully in */
  .bandana {
    transform-origin: 50% 60%;
    animation: bandanaReveal 14s ease-in-out 5s infinite;
  }
  @keyframes bandanaReveal {
    0%, 30%   { transform: translateY(0); }
    38%, 46%  { transform: translateY(28px) scaleY(0.7); }
    54%, 100% { transform: translateY(0); }
  }

  .eyes {
    opacity: 0;
    animation: eyesFlash 14s ease-in-out 5s infinite;
  }
  @keyframes eyesFlash {
    0%, 30% { opacity: 0; }
    40%, 44% { opacity: 1; }
    54%, 100% { opacity: 0; }
  }

  /* Hat lift during reveal */
  .hat {
    transform-origin: 50% 100%;
    animation: hatLift 14s ease-in-out 5s infinite;
  }
  @keyframes hatLift {
    0%, 30% { transform: translateY(0); }
    40%, 46% { transform: translateY(-6px); }
    54%, 100% { transform: translateY(0); }
  }

  /* Layer 4: Motorcycle rolls in */
  .layer-moto {
    opacity: 0;
    transform: translateX(620px);
    animation: motoRoll 1.6s cubic-bezier(0.2, 0.8, 0.3, 1) 7s forwards;
  }
  @keyframes motoRoll {
    0%   { opacity: 0; transform: translateX(620px); }
    20%  { opacity: 1; }
    80%  { opacity: 1; }
    100% { opacity: 1; transform: translateX(0); }
  }

  /* Moto idle vibration once arrived */
  .moto-inner {
    transform-origin: 50% 90%;
    animation: motoIdle 1.4s ease-in-out 8.6s infinite;
  }
  @keyframes motoIdle {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    25% { transform: translate(0.4px, -0.5px) rotate(0.05deg); }
    50% { transform: translate(-0.3px, 0.4px) rotate(-0.04deg); }
    75% { transform: translate(0.3px, -0.3px) rotate(0.03deg); }
  }

  /* Exhaust pulse after arrival */
  .exhaust {
    transform-origin: 50% 50%;
    animation: exhaustPulse 1.4s ease-in-out 8.6s infinite;
  }
  @keyframes exhaustPulse {
    0%, 100% { opacity: 0.85; transform: scale(1); }
    50%      { opacity: 1; transform: scale(1.04); }
  }

  /* Exhaust smoke drift */
  .smoke { opacity: 0; animation: smokeOut 3s ease-out 10s infinite; }
  @keyframes smokeOut {
    0%   { opacity: 0; transform: translate(0, 0) scale(0.5); }
    20%  { opacity: 0.5; }
    100% { opacity: 0; transform: translate(60px, -40px) scale(2.5); }
  }

  /* Layer 5: Tagline */
  .layer-tagline { animation: taglineIn 1.2s ease-out 11s forwards; }
  @keyframes taglineIn {
    0%   { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* Notes float in with tagline */
  .note-left, .note-right {
    transform-origin: 50% 50%;
    animation: noteFloat 4s ease-in-out 11.6s infinite;
  }
  .note-right { animation-delay: 13.6s; }
  @keyframes noteFloat {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    50%      { transform: translate(2px, -6px) rotate(2deg); }
  }

  /* Cell bars flex (subtle) */
  .bar {
    transform-origin: center;
    animation: barFlex 4.5s ease-in-out infinite;
  }
  .bar.b2 { animation-delay: 0.4s; }
  .bar.b3 { animation-delay: 0.8s; }
  .bar.b4 { animation-delay: 1.2s; }
  @keyframes barFlex {
    0%, 100% { transform: scaleX(1); }
    50%      { transform: scaleX(0.985); }
  }

  /* Final fade-to-black */
  .stage::after {
    content: "";
    position: absolute;
    inset: 0;
    background: #000;
    opacity: 0;
    animation: fadeOut 1.5s ease-in 13.5s forwards;
    pointer-events: none;
    z-index: 10;
  }
  @keyframes fadeOut {
    to { opacity: 1; }
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    .layer, .star, .moto-inner, .exhaust, .smoke, .note-left, .note-right, .bar {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
    }
    .eyes { opacity: 0 !important; }
  }
</style>
</head>
<body>

    </g>

    <g class="bandana">
      <path class="stroke" d="M 273 270 Q 300 278 327 270 L 327 300 Q 300 310 273 300 Z" stroke-width="2.8"/>
      <path class="stroke" d="M 280 280 Q 290 285 300 280 Q 310 285 320 280" stroke-width="1.5"/>
      <path class="stroke" d="M 280 290 Q 290 295 300 290 Q 310 295 320 290" stroke-width="1.5"/>
    </g>

    <path class="stroke" d="M 285 306 L 285 322 Q 300 330 315 322 L 315 306" stroke-width="2.5"/>

    <path class="stroke" d="M 240 370 Q 250 330 285 322 L 315 322 Q 350 330 360 370" stroke-width="3"/>
    <path class="stroke" d="M 285 322 L 285 342 M 315 322 L 315 342" stroke-width="2"/>
    <line class="stroke" x1="300" y1="330" x2="300" y2="370" stroke-width="2"/>
  </g>

  <!-- HANDS -->
  <g class="layer layer-bandit">

      <line class="stroke" x1="140" y1="455" x2="475" y2="455" stroke-width="4"/>
      <path class="stroke" d="M 255 425 L 255 460 L 325 460 L 325 425 Z" stroke-width="3"/>
      <line class="stroke" x1="265" y1="432" x2="265" y2="455" stroke-width="1.5"/>
      <line class="stroke" x1="278" y1="432" x2="278" y2="455" stroke-width="1.5"/>
      <line class="stroke" x1="302" y1="432" x2="302" y2="455" stroke-width="1.5"/>
      <line class="stroke" x1="315" y1="432" x2="315" y2="455" stroke-width="1.5"/>
      <line class="stroke" x1="258" y1="438" x2="322" y2="438" stroke-width="1"/>

      <g class="exhaust">

        <circle class="stroke" cx="460" cy="483" r="5" stroke-width="2.5"/>
      </g>

      <circle class="stroke" cx="135" cy="510" r="22" stroke-width="3"/>

      <line class="stroke" x1="451" y1="510" x2="499" y2="510" stroke-width="1.5"/>

      <line class="stroke" x1="413" y1="440" x2="415" y2="410" stroke-width="2.5"/>
      <path class="stroke" d="M 415 410 Q 430 410 430 422" stroke-width="2.5"/>
    </g>

    <!-- Exhaust smoke (drifts right and up) -->
    <g class="smoke">
      <ellipse cx="465" cy="483" rx="12" ry="6" fill="#fff" opacity="0.3"/>
      <ellipse cx="475" cy="478" rx="8" ry="4" fill="#fff" opacity="0.2"/>
    </g>
  </g>

  <!-- EIGHTH NOTES -->
  <g class="layer layer-tagline">
    <g class="note-left">
      <line class="stroke" x1="135" y1="558" x2="135" y2="528" stroke-width="3"/>
      <ellipse class="fill-white" cx="128" cy="562" rx="7" ry="5" transform="rotate(-20 128 562)"/>
    </g>
    <g class="note-right">

      <ellipse class="fill-white" cx="458" cy="562" rx="7" ry="5" transform="rotate(-20 458 562)"/>

    <text x="300" y="568" text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif"
          font-style="italic"

          fill="#fff"
          font-weight="400">music for all occasions</text>

    <line class="stroke" x1="80" y1="540" x2="520" y2="540" stroke-width="1" opacity="0.4"/>
  </g>

</svg>
</div>
</body>
